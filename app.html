<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>G.GUI — Apps</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" type="image/png" href="assets/img/favicon.png" />
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/main.css">
  <link rel="stylesheet" href="assets/css/pages.css">

  <style>
    :root {
      --bg-dark: #0a0a0b;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.1);
      --accent: #00ffe7;
      --text-main: #e0e0e0;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg-dark);
      font-family: 'Inter', sans-serif; /* Cleaner body font */
      color: var(--text-main);
      overflow: hidden;
    }

    .top-bar {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 30px;
      background: rgba(0, 0, 0, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--card-border);
      z-index: 100;
    }

    .app-shell {
      position: absolute;
      top: 64px;
      left: 0;
      right: 0;
      bottom: 0;
      overflow-y: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--card-border) transparent;
    }

    .app-selector {
      max-width: 1200px;
      margin: 0 auto;
      padding: 60px 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app-selector h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 32px;
      letter-spacing: 4px;
      margin-bottom: 50px;
      color: #fff;
      text-transform: uppercase;
    }

    .app-buttons {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      width: 100%;
    }

    .app-card {
      position: relative;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 30px 20px;
      text-align: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 100px;
    }

    .app-card:hover {
      background: rgba(255, 255, 255, 0.07);
      border-color: var(--accent);
      transform: translateY(-5px);
    }

    .app-card span {
      font-size: 14px;
      font-weight: 500;
      color: #ccc;
      transition: color 0.3s;
    }

    .app-card:hover span {
      color: var(--accent);
    }

    /* Clean ALT Badge */
    .alt-badge {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 9px;
      padding: 2px 6px;
      border-radius: 4px;
      background: transparent;
      color: var(--accent);
      border: 1px solid var(--accent);
      opacity: 0.6;
      transition: opacity 0.3s;
    }

    .app-card:hover .alt-badge {
      opacity: 1;
      background: var(--accent);
      color: #000;
    }

    /* App View & Back Button */
    .app-view {
      position: fixed;
      inset: 64px 0 0 0;
      display: none;
      background: #000;
      z-index: 50;
    }

    #backBtn {
      display: none;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 6px 15px;
      border-radius: 4px;
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      cursor: pointer;
      margin-right: 20px;
    }

    #backBtn:hover {
        background: var(--accent);
        color: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* Modal Styling */
    .alt-popup {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(5px);
    }

    .alt-popup-content {
      background: #111;
      padding: 40px;
      border-radius: 20px;
      border: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 90%;
      max-width: 350px;
    }

    .alt-link-btn {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: #fff;
      padding: 15px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;
    }

    .alt-link-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .close-alt {
      margin-top: 10px;
      background: transparent;
      color: #666;
      border: none;
      cursor: pointer;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header class="top-bar">
  <div style="display: flex; align-items: center;">
    <button id="backBtn" onclick="closeApp()">← BACK</button>
    <a href="index.html" class="controller-home" title="Home">
      <img src="assets/img/controller.svg" alt="Home" style="width: 24px; opacity: 0.8;">
    </a>
  </div>

  <a href="https://discord.gg/AC5nAtdd" target="_blank" class="discord-btn" style="text-decoration: none; color: var(--accent); font-size: 14px;">
    DISCORD
  </a>
</header>

<main class="app-shell">
  <div class="app-selector" id="appSelector">
    <h1>Systems</h1>

    <div class="app-buttons">
      <div class="app-card" onclick="launchApp('https://edu.waterloomath.com/')" data-alt="https://coolmathgames.metropolitanstaffingsolutions.com/,https://mathteachersforhire.shop/">
        <span>Truffled</span>
        <div class="alt-badge" onclick="openAlt(event, this.parentElement)">ALT</div>
      </div>

      <div class="app-card" onclick="launchApp('https://shadow-good.bostoncareercounselor.com/')">
        <span>Shadow Good</span>
      </div>

      <div class="app-card" onclick="launchApp('https://highschoolmathteachers.com/')" data-alt="https://larp.now/">
        <span>Froggies Arcade</span>
        <div class="alt-badge" onclick="openAlt(event, this.parentElement)">ALT</div>
      </div>

      <div class="app-card" onclick="launchApp('https://abc.school.dovereducation.org/')"><span>Nebulo</span></div>
      <div class="app-card" onclick="launchApp('https://silvervalethegoat.graphicon.ru/')"><span>Zepto Learning 2</span></div>
      <div class="app-card" onclick="launchApp('https://pictures.about-anthony.com/')"><span>Infamous</span></div>
      <div class="app-card" onclick="launchApp('https://rooms.verandahotels.com/')"><span>Void Network</span></div>
      <div class="app-card" onclick="launchApp('https://vcsayt.blanksheetstudios.com/')"><span>Rammerhead</span></div>
      <div class="app-card" onclick="launchApp('https://math-help.blanksheetstudios.com/')"><span>Glint Browser</span></div>
      <div class="app-card" onclick="launchApp('https://family.1382.hotelconsuladoinn.com/')"><span>Luminal OS</span></div>
      
      <div class="app-card" onclick="launchApp('https://mathtoolseducation.allastella.it/')" data-alt="https://math5.tcloud.my/">
        <span>OverCloaked</span>
        <div class="alt-badge" onclick="openAlt(event, this.parentElement)">ALT</div>
      </div>

      <div class="app-card" onclick="launchApp('https://mall-shopping.egevad.se/')"><span>Galaxy V6</span></div>
      <div class="app-card" onclick="launchApp('https://joinergeometry.kathmandubiz.com/')"><span>Interstellar</span></div>
      <div class="app-card" onclick="launchApp('https://educationforindia.com/')"><span>Vapor V4</span></div>
      <div class="app-card" onclick="launchApp('https://cheese-tutorial-culinary-sciences.b-cdn.net/')"><span>Cheesy</span></div>
      <div class="app-card" onclick="launchApp('https://subscribevcsa.slowfactory.es/')"><span>Boredom V2</span></div>
      <div class="app-card" onclick="launchApp('http://math.nei.cl/')"><span>Reds Exploits</span></div>
      <div class="app-card" onclick="launchApp('https://travel-earth4.hotelconsuladoinn.com/')"><span>EarthHub</span></div>
      <div class="app-card" onclick="launchApp('https://educationalarts.polden.com/')"><span>Bromine</span></div>
    </div>
  </div>

  <div class="app-view" id="appView">
    <iframe id="appFrame"></iframe>
  </div>
</main>

<div class="alt-popup" id="altPopup">
  <div class="alt-popup-content" id="altContent"></div>
</div>

<script>
  function launchApp(url) {
    document.getElementById('appSelector').style.display = 'none';
    document.getElementById('appView').style.display = 'block';
    document.getElementById('backBtn').style.display = 'block';
    document.getElementById('appFrame').src = url;
    document.getElementById('altPopup').style.display = 'none';
  }

  function closeApp() {
    document.getElementById('appSelector').style.display = 'flex';
    document.getElementById('appView').style.display = 'none';
    document.getElementById('backBtn').style.display = 'none';
    document.getElementById('appFrame').src = '';
  }

  function openAlt(event, parentCard) {
    event.stopPropagation();
    const altData = parentCard.getAttribute('data-alt');
    if (!altData) return;

    const links = altData.split(',');
    const popup = document.getElementById('altPopup');
    const content = document.getElementById('altContent');
    content.innerHTML = '<h2 style="font-size:14px; margin-top:0; color:#666;">SELECT VERSION</h2>';

    links.forEach((link, index) => {
      const btn = document.createElement('button');
      btn.className = 'alt-link-btn';
      btn.textContent = "Mirror Link " + (index + 1);
      btn.onclick = () => launchApp(link.trim());
      content.appendChild(btn);
    });

    const closeBtn = document.createElement('button');
    closeBtn.textContent = "CANCEL";
    closeBtn.className = "close-alt";
    closeBtn.onclick = () => popup.style.display = 'none';
    content.appendChild(closeBtn);

    popup.style.display = 'flex';
  }

  // Close popup if clicking outside content
  window.onclick = function(event) {
    const popup = document.getElementById('altPopup');
    if (event.target == popup) popup.style.display = "none";
  }
</script>

</body>
</html>
